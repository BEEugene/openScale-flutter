name: openscale
description: Open-source weight and body metrics tracker for Aurora OS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Database
  sqflite: ^2.4.1
  path: ^1.9.1

  # Navigation
  go_router: ^14.8.1

  # Charts (pure Dart, Canvas-based)
  fl_chart: ^0.69.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  csv: ^6.0.0
  logging: ^1.3.0

  # BLE (Aurora OS — раскомментировать при сборке на Aurora SDK)
  # flutter_reactive_ble: ^5.3.1
  # flutter_reactive_ble_aurora:
  #   git:
  #     url: https://developer.auroraos.ru/git/flutter/flutter-community-plugins/flutter_reactive_ble_aurora.git

  # DI
  get_it: ^8.0.3

  # Settings persistence
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
